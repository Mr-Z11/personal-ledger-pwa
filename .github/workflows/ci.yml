name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install --no-save --legacy-peer-deps @rollup/rollup-linux-x64-gnu
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  docker-images:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/api.Dockerfile
          push: true
          tags: |
            ghcr.io/mr-z11/personal-ledger-pwa-api:main
            ghcr.io/mr-z11/personal-ledger-pwa-api:sha-${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/web.Dockerfile
          push: true
          build-args: |
            VITE_API_BASE=/api
          tags: |
            ghcr.io/mr-z11/personal-ledger-pwa-web:main
            ghcr.io/mr-z11/personal-ledger-pwa-web:sha-${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
